name: 🤖 Kanka Sinyal Botu

on:
  schedule:
    # Her saat başı çalışır (UTC) — Türkiye UTC+3, yani saat 04:00-22:00 TR saati
    - cron: "0 1-19 * * 1-5"   # Pazartesi-Cuma, 04:00-22:00 TR (borsa saatleri)
  workflow_dispatch:             # Manuel tetikleme butonu (test için)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10          # 10 dakikadan uzun sürerse iptal et

    permissions:
      contents: write           # Repo'ya geri yazabilmek için (history kaydı)

    steps:
      # 1. Repo'yu çek
      - name: 📥 Repo'yu çek
        uses: actions/checkout@v4

      # 2. Python kur
      - name: 🐍 Python 3.11 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Bağımlılıkları yükle
      - name: 📦 Bağımlılıkları yükle
        run: pip install -r requirements.txt

      # 4. Botu çalıştır (tek seferlik --once modu)
      - name: 🚀 Botu çalıştır
        env:
          FINNHUB_API_KEY:      ${{ secrets.FINNHUB_API_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          TICKERS:              ${{ secrets.TICKERS }}
          BUY_THRESHOLD:        ${{ secrets.BUY_THRESHOLD }}
          SELL_THRESHOLD:       ${{ secrets.SELL_THRESHOLD }}
        run: python sinyal_botu.py --once

      # 5. Sinyal geçmişini repo'ya kaydet
      - name: 💾 Sinyal geçmişini kaydet
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Sinyal güncellemesi: ${{ github.run_id }}"
          file_pattern: "signals_history.json bot_log.txt"
          skip_dirty_check: false
